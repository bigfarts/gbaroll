name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # The wasm bundle: the mgba C core cross-compiles via wasi-sdk's
  # clang into the wasm32-unknown-unknown Rust binary, then dx wraps
  # it into the static site.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mgba-sys's build script, bindgen, and the cc crate (zstd's
      # wasm shim) read these; see .cargo/config.toml for the local
      # equivalent.
      - name: Install wasi-sdk
        run: |
          curl -fsSL -o /tmp/wasi-sdk.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sdk-25.0-x86_64-linux.tar.gz"
          sudo tar -C /opt -xzf /tmp/wasi-sdk.tar.gz
          sudo mv /opt/wasi-sdk-25.0-x86_64-linux /opt/wasi-sdk
          {
            echo "WASI_SDK_PATH=/opt/wasi-sdk"
            echo "CC_wasm32_unknown_unknown=/opt/wasi-sdk/bin/clang"
            echo "AR_wasm32_unknown_unknown=/opt/wasi-sdk/bin/llvm-ar"
          } >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main

      # --force: the rust-cache restores ~/.cargo's install manifest
      # but not the binaries, so binstall would otherwise skip the
      # install as "already done" on every cache hit.
      - name: Install dioxus-cli
        run: cargo binstall --no-confirm --force dioxus-cli@0.7.9

      - name: Build the web bundle
        run: dx build --package gbaroll --release

      # The bundle IS the site: stamp the custom domain and hand it to
      # Pages.
      - name: Stamp the Pages domain
        run: echo "gbaroll.farts.fyi" > target/dx/gbaroll/release/web/public/CNAME

      # The service worker's URL sets its scope, Pages can't send
      # Service-Worker-Allowed to widen one, and dx flattens bundled
      # assets into /assets/ — so the root copy happens here.
      - name: Root the service worker
        run: cp gbaroll/sw.js target/dx/gbaroll/release/web/public/sw.js

      - name: Upload the Pages bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/gbaroll/release/web/public

  # Publish the bundle to GitHub Pages (pushes to main only; PRs stop
  # at the build).
  pages:
    needs: web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # The native pieces (workspace default members).
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test
