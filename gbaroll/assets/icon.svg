<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">


  <!-- AGB-001 geometry from icons8's "gameboy-advance-console"
       (48x48), recolored to the app palette: the full-width slab
       forms the grips, the pinched front panel arcs between them,
       screen lit in the bright accent. Nose up, exhaust below. -->
  <g transform="rotate(-8 256 218) translate(57 19) scale(8.3)">
    <!-- Body slab (the grip ends) -->
    <path fill="#2f334d" d="M43,37H5c-2.761,0-5-2.239-5-5V16c0-2.761,2.239-5,5-5h38c2.761,0,5,2.239,5,5v16 C48,34.761,45.761,37,43,37z"/>
    <!-- Pinched front panel -->
    <path fill="#7aa2f7" d="M41.898,11.898l-0.434-0.434C40.527,10.527,39.255,10,37.929,10H10.071 c-1.326,0-2.598,0.527-3.535,1.464l-0.467,0.467c-0.98,0.98-2.112,1.834-3.417,2.301C1.106,14.787,0,16.264,0,18v12 c0,1.736,1.106,3.213,2.651,3.767c1.305,0.467,2.437,1.321,3.417,2.301l0.467,0.467C7.473,37.473,8.745,38,10.071,38h27.858 c1.326,0,2.598-0.527,3.536-1.464l0.434-0.434c1.002-1.002,2.167-1.857,3.496-2.351C46.916,33.185,48,31.719,48,30V18 c0-1.719-1.084-3.185-2.606-3.75C44.065,13.756,42.901,12.901,41.898,11.898z"/>
    <!-- Screen surround -->
    <path fill="#16161e" d="M32.052,32.804l-1.475,0.402c-4.307,1.175-8.849,1.175-13.156,0l-1.475-0.402 C14.207,32.329,13,30.749,13,28.945V18c0-2.209,1.791-4,4-4h14c2.209,0,4,1.791,4,4v10.945C35,30.749,33.793,32.329,32.052,32.804z"/>
    <!-- A/B buttons -->
    <circle cx="39" cy="23" r="2" fill="#16161e"/>
    <circle cx="44" cy="21" r="2" fill="#16161e"/>
    <!-- D-pad -->
    <polygon fill="#16161e" points="10,20 8,20 8,18 5,18 5,20 3,20 3,23 5,23 5,25 8,25 8,23 10,23"/>
    <!-- Screen, lit -->
    <rect width="14" height="13" x="17" y="17" fill="#89b4ff"/>
  </g>
  <!-- The fart: puff clouds trailing off the rear grip, fading out -->
  <g fill="#9ece6a">
    <g opacity="0.95">
      <circle cx="128" cy="398" r="30"/>
      <circle cx="94" cy="412" r="23"/>
      <circle cx="158" cy="414" r="21"/>
      <circle cx="122" cy="426" r="23"/>
    </g>
    <g opacity="0.55">
      <circle cx="76" cy="448" r="15"/>
      <circle cx="100" cy="456" r="11"/>
    </g>
    <circle cx="56" cy="474" r="8" opacity="0.3"/>
  </g>
</svg>
