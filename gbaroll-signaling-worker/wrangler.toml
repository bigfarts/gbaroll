name = "gbaroll-signaling"
main = "src/index.ts"
# Bump freely, but keep ≤ the workerd bundled with the wrangler you
# `dev` with.
compatibility_date = "2025-05-05"
workers_dev = true
routes = [
  { pattern = "gbaroll-signaling.farts.fyi", custom_domain = true },
]

[observability]
enabled = true

# All rooms live in one instance of this object; see src/index.ts.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Rooms"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Rooms"]

# Secrets (set with `wrangler secret put`, not here):
#   CLOUDFLARE_TURN_TOKEN_ID    Cloudflare TURN key id
#   CLOUDFLARE_TURN_API_TOKEN   its API token
# Without them the server hands out a STUN-only list.

[vars]
# TURN_CRED_TTL = "86400"  # minted-credential lifetime, seconds
